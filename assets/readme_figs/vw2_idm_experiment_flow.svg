<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="520" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">VideoWorld2-IDM reliability flow</title>
  <desc id="desc">The experiment cleanup syncs the repo, adds reliability guards, validates tests, checks if real CALVIN data and environment exist, then either runs real closed loop or narrows the report to offline and mock evidence before cleanup and publication.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #243b53; stroke-width: 2; rx: 8; }
      .guard { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
      .gate { fill: #fffbeb; stroke: #b45309; stroke-width: 2; rx: 8; }
      .done { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .warn { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .txt { font: 18px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .title { font: 28px Arial, sans-serif; font-weight: 700; fill: #111827; }
      .edge { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1320" height="520"/>
  <text class="title" x="36" y="52">Reliability Cleanup And Publication Flow</text>
  <text class="small" x="38" y="80">Real CALVIN closed-loop is conditional on restoring raw data and environment within the budget policy.</text>

  <rect class="box" x="40" y="140" width="165" height="82"/>
  <text class="txt" x="70" y="174">Sync repo</text>
  <text class="small" x="70" y="198">origin/main</text>

  <rect class="box" x="245" y="140" width="175" height="82"/>
  <text class="txt" x="274" y="174">Audit assets</text>
  <text class="small" x="274" y="198">code, configs, results</text>

  <rect class="guard" x="460" y="120" width="215" height="122"/>
  <text class="txt" x="486" y="154">Reliability guards</text>
  <text class="small" x="486" y="180">causal planner mask</text>
  <text class="small" x="486" y="202">cache and split checks</text>
  <text class="small" x="486" y="224">checkpoint matching</text>

  <rect class="guard" x="715" y="140" width="170" height="82"/>
  <text class="txt" x="746" y="174">Validation</text>
  <text class="small" x="746" y="198">tests and compile</text>

  <rect class="gate" x="930" y="112" width="220" height="138"/>
  <text class="txt" x="958" y="150">CALVIN data/env?</text>
  <text class="small" x="958" y="176">raw frames/actions</text>
  <text class="small" x="958" y="198">real evaluator package</text>
  <text class="small" x="958" y="220">50 CNY cap</text>

  <rect class="done" x="930" y="318" width="220" height="96"/>
  <text class="txt" x="958" y="354">Offline package</text>
  <text class="small" x="958" y="378">result table + report</text>
  <text class="small" x="958" y="398">mock boundary explicit</text>

  <rect class="done" x="1180" y="140" width="110" height="82"/>
  <text class="txt" x="1208" y="174">Publish</text>
  <text class="small" x="1208" y="198">commit + push</text>

  <path class="edge" d="M205 181 H245"/>
  <path class="edge" d="M420 181 H460"/>
  <path class="edge" d="M675 181 H715"/>
  <path class="edge" d="M885 181 H930"/>
  <path class="edge" d="M1040 250 V318"/>
  <path class="edge" d="M1150 181 H1180"/>
  <path class="edge" d="M1150 366 C1185 350 1200 248 1216 222"/>
  <text class="small" x="1060" y="286">no local real CALVIN env found</text>
</svg>
